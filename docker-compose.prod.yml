services:
  # === BASE DE DONNÉES PostGIS ===
  db:
    image: postgis/postgis:15-3.4
    container_name: solidata-db
    restart: always
    environment:
      POSTGRES_DB: solidata
      POSTGRES_USER: solidata_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/backups:/backups
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solidata_user -d solidata"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # === REDIS (Cache, Socket.IO adapter, Job Queue) ===
  redis:
    image: redis:7-alpine
    container_name: solidata-redis
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1000
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 320M
          cpus: '0.5'

  # === BACKEND API Node.js ===
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: solidata-api
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: solidata
      DB_USER: solidata_user
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 8h
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 3001
      NODE_ENV: production
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      OPENAGENDA_API_KEY: ${OPENAGENDA_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-20250514}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CENTRE_TRI_LAT: 49.4231
      CENTRE_TRI_LNG: 1.0993
      BOUTIQUE_CSV_BASE_PATH: /data/boutiques-csv
      BOUTIQUE_WEBHOOK_SECRET: ${BOUTIQUE_WEBHOOK_SECRET:-}
      LIVEOBJECTS_ENABLED: ${LIVEOBJECTS_ENABLED:-false}
      LIVEOBJECTS_MQTT_URL: ${LIVEOBJECTS_MQTT_URL:-mqtts://liveobjects.orange-business.com:8883}
      LIVEOBJECTS_API_KEY: ${LIVEOBJECTS_API_KEY:-}
      LIVEOBJECTS_FIFO_NAME: ${LIVEOBJECTS_FIFO_NAME:-solidata-cav-uplinks}
      LIVEOBJECTS_WEBHOOK_SECRET: ${LIVEOBJECTS_WEBHOOK_SECRET:-}
      LORA_APPKEY_ENCRYPTION_KEY: ${LORA_APPKEY_ENCRYPTION_KEY:-}
      SENSOR_FRESHNESS_HOURS: ${SENSOR_FRESHNESS_HOURS:-8}
    volumes:
      - uploads:/app/uploads
      - ./boutiques-csv:/data/boutiques-csv
      - "./Liste PAV.xlsx:/data/Liste PAV.xlsx:ro"
      - ./tournee.xlsx:/data/tournee.xlsx:ro
      - ./tonnages.xlsx:/data/tonnages.xlsx:ro
      - ./KPI_Production 2026.xlsx:/data/KPI_Production 2026.xlsx:ro
      - ./Carte des PAV au 28-02-2026.kml:/data/Carte des PAV au 28-02-2026.kml:ro
      - "./Dashboard 2025.xlsm:/data/Dashboard 2025.xlsm:ro"
      - "./Dashboard 2026.xlsm:/data/Dashboard 2026.xlsm:ro"
      - "./Feuille_Production_V1.xlsx:/data/Feuille_Production_V1.xlsx:ro"
      - "./Liste_asso.xlsx:/data/Liste_asso.xlsx:ro"
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '2.0'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # === FRONTEND React ===
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: solidata-web
    restart: always
    depends_on: [backend]
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

  # === MOBILE PWA ===
  mobile:
    build:
      context: ./mobile
      dockerfile: Dockerfile
    container_name: solidata-mobile
    restart: always
    depends_on: [backend]
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

  # === NGINX Reverse Proxy SSL ===
  nginx:
    image: nginx:alpine
    container_name: solidata-proxy
    restart: always
    entrypoint: ["/bin/sh", "-c", "apk add --no-cache openssl >/dev/null 2>&1; mkdir -p /etc/letsencrypt/live/solidata.online; CERT_DIR=/etc/letsencrypt/live/solidata.online; if [ -d /etc/letsencrypt/live/solidata.online-0001 ] && [ -f /etc/letsencrypt/live/solidata.online-0001/fullchain.pem ]; then cp -fL /etc/letsencrypt/live/solidata.online-0001/fullchain.pem $CERT_DIR/fullchain.pem; cp -fL /etc/letsencrypt/live/solidata.online-0001/privkey.pem $CERT_DIR/privkey.pem; echo \"Using LetsEncrypt certificate from solidata.online-0001\"; elif [ ! -f $CERT_DIR/fullchain.pem ]; then openssl req -x509 -nodes -days 1 -newkey rsa:2048 -keyout $CERT_DIR/privkey.pem -out $CERT_DIR/fullchain.pem -subj /CN=solidata.online; echo \"Generated self-signed certificate (first deploy)\"; else echo \"Using existing certificate\"; fi && exec nginx -g \"daemon off;\"" ]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot
    depends_on: [frontend, mobile, backend]
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # === CERTBOT SSL ===
  certbot:
    image: certbot/certbot
    container_name: solidata-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"
    networks:
      - internal

volumes:
  pgdata:
    name: solidata-pgdata
  uploads:
    name: solidata-uploads
  certbot-etc:
    name: solidata-certbot-etc
  certbot-var:
    name: solidata-certbot-var
  certbot-webroot:
    name: solidata-certbot-webroot

networks:
  internal:
    name: solidata-network
    driver: bridge
