services:
  # === BASE DE DONNÉES PostGIS ===
  db:
    image: postgis/postgis:15-3.4
    container_name: solidata-db
    restart: always
    environment:
      POSTGRES_DB: solidata
      POSTGRES_USER: solidata_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/backups:/backups
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solidata_user -d solidata"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # === BACKEND API Node.js ===
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: solidata-api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: solidata
      DB_USER: solidata_user
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 8h
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 3001
      NODE_ENV: production
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      CENTRE_TRI_LAT: 49.4231
      CENTRE_TRI_LNG: 1.0993
    volumes:
      - uploads:/app/uploads
      - ./tournee.xlsx:/data/tournee.xlsx:ro
      - ./tonnages.xlsx:/data/tonnages.xlsx:ro
      - ./KPI_Production 2026.xlsx:/data/KPI_Production 2026.xlsx:ro
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # === FRONTEND React ===
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: solidata-web
    restart: always
    depends_on: [backend]
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 128M

  # === MOBILE PWA ===
  mobile:
    build:
      context: ./mobile
      dockerfile: Dockerfile
    container_name: solidata-mobile
    restart: always
    depends_on: [backend]
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 128M

  # === NGINX Reverse Proxy SSL ===
  nginx:
    image: nginx:alpine
    container_name: solidata-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot
    depends_on: [frontend, mobile, backend]
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # === CERTBOT SSL ===
  certbot:
    image: certbot/certbot
    container_name: solidata-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"
    networks:
      - internal

volumes:
  pgdata:
    name: solidata-pgdata
  uploads:
    name: solidata-uploads
  certbot-etc:
    name: solidata-certbot-etc
  certbot-var:
    name: solidata-certbot-var
  certbot-webroot:
    name: solidata-certbot-webroot

networks:
  internal:
    name: solidata-network
    driver: bridge
