version: '3.8'
services:
  db:
    image: postgis/postgis:15-3.4
    container_name: solidata-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: solidata
      POSTGRES_USER: solidata_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solidata_user -d solidata"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: solidata-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: solidata
      DB_USER: solidata_user
      DB_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      JWT_EXPIRES_IN: 8h
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 3001
      NODE_ENV: production
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      OPENAGENDA_API_KEY: ${OPENAGENDA_API_KEY:-}
      CENTRE_TRI_LAT: 49.4231
      CENTRE_TRI_LNG: 1.0993
      LOGICS_MAIL_HOST: ${LOGICS_MAIL_HOST:-imap.outlook.com}
      LOGICS_MAIL_PORT: ${LOGICS_MAIL_PORT:-993}
      LOGICS_MAIL_USER: ${LOGICS_MAIL_USER:-}
      LOGICS_MAIL_PASS: ${LOGICS_MAIL_PASS:-}
      BOUTIQUE_WEBHOOK_SECRET: ${BOUTIQUE_WEBHOOK_SECRET:-}
      LIVEOBJECTS_ENABLED: ${LIVEOBJECTS_ENABLED:-false}
      LIVEOBJECTS_MQTT_URL: ${LIVEOBJECTS_MQTT_URL:-mqtts://liveobjects.orange-business.com:8883}
      LIVEOBJECTS_API_KEY: ${LIVEOBJECTS_API_KEY:-}
      LIVEOBJECTS_FIFO_NAME: ${LIVEOBJECTS_FIFO_NAME:-solidata-cav-uplinks}
      LIVEOBJECTS_WEBHOOK_SECRET: ${LIVEOBJECTS_WEBHOOK_SECRET:-}
      LORA_APPKEY_ENCRYPTION_KEY: ${LORA_APPKEY_ENCRYPTION_KEY:-}
      SENSOR_FRESHNESS_HOURS: ${SENSOR_FRESHNESS_HOURS:-8}
    ports:
      - "3001:3001"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs

  frontend:
    build: ./frontend
    container_name: solidata-web
    restart: unless-stopped
    depends_on: [backend]
    ports:
      - "3000:80"

  mobile:
    build: ./mobile
    container_name: solidata-mobile
    restart: unless-stopped
    depends_on: [backend]
    ports:
      - "3002:80"

  nginx:
    image: nginx:alpine
    container_name: solidata-nginx
    restart: unless-stopped
    depends_on: [backend, frontend, mobile]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/entrypoint.sh:/docker-entrypoint-custom.sh:ro
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: ["/bin/sh", "/docker-entrypoint-custom.sh"]

  certbot:
    image: certbot/certbot
    container_name: solidata-certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew --webroot -w /var/www/certbot --quiet; done'"

volumes:
  pgdata:
  certbot-www:
