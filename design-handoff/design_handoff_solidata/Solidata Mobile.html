<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Solidata Mobile — exploration</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="mifi/app.css?v=4">
<style>
  body { background: #EAE6DD; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
  .mob-screen {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--slate-50);
    display: flex; flex-direction: column;
    font-size: 15px;
  }
  .mob-top {
    background: white;
    padding: 12px 18px;
    border-bottom: 1px solid var(--slate-200);
    display: flex; align-items: center; gap: 10px;
  }
  .mob-top-back { width: 36px; height: 36px; border-radius: 50%; background: var(--slate-100); display: grid; place-items: center; color: var(--slate-700); }
  .mob-top h2 { margin: 0; font-size: 17px; font-weight: 800; color: var(--slate-900); flex: 1; }
  .mob-body { flex: 1; overflow-y: auto; padding: 16px; }
  .mob-tabbar {
    background: white;
    border-top: 1px solid var(--slate-200);
    display: flex;
    padding: 10px 0 22px;
  }
  .mob-tab {
    flex: 1;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 6px 0;
    color: var(--slate-500);
    font-size: 11px; font-weight: 600;
    min-height: 56px;
  }
  .mob-tab .ic { width: 24px; height: 24px; }
  .mob-tab.active { color: var(--teal-700); }
  .mob-tab.active .ic { stroke-width: 2.5; }

  .big-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    min-height: 64px;
    padding: 16px 22px;
    background: var(--teal-600); color: white;
    font-size: 18px; font-weight: 700;
    border-radius: 16px;
    width: 100%;
    box-shadow: 0 4px 14px -2px rgba(13,148,136,0.4);
  }
  .big-btn.ghost { background: white; color: var(--slate-800); border: 2px solid var(--slate-200); box-shadow: none; }
  .big-btn.danger { background: var(--red-600); }
  .big-btn.amber { background: var(--amber-700); }

  .mob-card {
    background: white;
    border: 1px solid var(--slate-200);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .hit-56 { min-height: 56px; }
  .huge-num { font-size: 40px; font-weight: 800; color: var(--slate-900); letter-spacing: -0.02em; line-height: 1; }
  .simple-label { font-size: 13px; color: var(--slate-500); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }

  /* PCM mobile overrides */
  .pcm-m-question { font-size: 22px; font-weight: 700; color: var(--slate-900); text-align: center; margin: 0 0 20px; }
  .pcm-m-choice {
    display: flex; flex-direction: column; align-items: center;
    background: white; border: 2px solid var(--slate-200);
    border-radius: 20px;
    padding: 24px 12px;
    gap: 10px;
    min-height: 140px;
  }
  .pcm-m-choice .emoji { font-size: 54px; line-height: 1; }
  .pcm-m-choice .lbl { font-size: 16px; font-weight: 700; color: var(--slate-900); text-align: center; }

  /* Map placeholder */
  .mini-map {
    height: 200px; border-radius: 14px;
    background-image:
      linear-gradient(var(--slate-100) 1px, transparent 1px),
      linear-gradient(90deg, var(--slate-100) 1px, transparent 1px),
      radial-gradient(circle at 40% 50%, rgba(204,251,241,0.5), transparent 50%),
      linear-gradient(135deg, #FAFAF9, #F5F5F4);
    background-size: 28px 28px, 28px 28px, 100%, 100%;
    border: 1px solid var(--slate-200);
    position: relative;
    overflow: hidden;
  }
  .map-truck { position: absolute; background: var(--teal-600); color: white; padding: 6px 10px; border-radius: 99px; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.25); }

  /* Stepper */
  .step-circle { width: 28px; height: 28px; border-radius: 50%; background: var(--slate-200); color: var(--slate-500); display: grid; place-items: center; font-weight: 700; font-size: 12px; flex-shrink: 0; }
  .step-circle.done { background: var(--green-600); color: white; }
  .step-circle.current { background: var(--teal-600); color: white; box-shadow: 0 0 0 4px var(--teal-100); }

  /* Notes */
  .note {
    background: #FEF9C3;
    border: 1px solid #FDE68A;
    color: #78350F;
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 12.5px;
    font-weight: 600;
  }
</style>
</head>
<body>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<div id="root"></div>

<script type="text/babel" src="mobile/design-canvas.jsx"></script>
<script type="text/babel" src="mobile/ios-frame.jsx"></script>
<script type="text/babel" src="mobile/screens/login-variants.jsx"></script>
<script type="text/babel" src="mobile/screens/tournee-variants.jsx"></script>
<script type="text/babel" src="mobile/screens/alerts-variants.jsx"></script>
<script type="text/babel" src="mobile/screens/pcm-variants.jsx"></script>
<script type="text/babel" src="mobile/screens/dashboard-variants.jsx"></script>
<script type="text/babel" src="mobile/app.jsx"></script>
</body>
</html>
